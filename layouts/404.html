<!DOCTYPE html>
<html lang="en-us">

{{partial "head.html" . }}

<head>
    {{ $contentStyle := resources.Get "css/content.css" | minify | fingerprint }}
    <link rel="stylesheet" href="{{ $contentStyle.RelPermalink }}" integrity="{{ $contentStyle.Data.Integrity }}">
</head>

<body>
    {{ partial "navbar.html" . }}
    <div class="container pt-5 mt-5">
        <h1 class="text-center">404</h1>
        <p><strong>Page not found :(</strong></p>
        <p>The requested page could not be found.</p>
    </div>
    {{ partial "footer.html" . }}
</body>

</html>
